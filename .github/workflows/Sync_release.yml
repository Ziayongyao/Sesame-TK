name: Sync & Release

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    tags: ["*"]
  pull_request:
    branches: [develop, main]

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    outputs:
      sync_status:: ${{ steps.sync_check.outputs.sync_status }}
      has_conflict:: ${{ steps.sync_check.outputs.has_conflict }}
    steps:
      - name: Full Repository Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

  build-and-release:
    needs: sync-upstream
    if: needs.sync-upstream.outputs.sync_status != 'conflict'
    runs-on: ubuntu-latest
    concurrency: release-${{ github.ref }}
    
    steps:
      # 1. 基础配置
      - name: Set Timezone
        run: sudo timedatectl set-timezone Asia/Shanghai
        
      # 2. 完整检出代码（包含子模块）
      - name: Full Repository Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      # 3. 子模块初始化（关键修复）
      - name: Initialize Submodules
        run: |
          echo "初始化子模块..."
          git submodule update --init --recursive
          # 确保所有子模块切换到正确分支
          git submodule foreach --recursive '
            if [ -f .gitmodules ]; then
              git checkout main || git checkout master || true
            fi
          '

      # 4. 文件验证（修正后的路径匹配）
      - name: Verify Gradle Files
        run: |
          echo "验证Gradle配置文件..."
          
          # 修正后的文件搜索路径
          find . -name "gradle-wrapper.properties" | grep -q "gradle-wrapper.properties" || { echo "错误: gradle-wrapper.properties未找到"; exit 1; }
          find . -name "Versions.kt" | grep -q "Versions.kt" || { echo "错误: Versions.kt未找到"; exit 1; }
          find . -name "Dependencies.kt" | grep -q "Dependencies.kt" || { echo "错误: Dependencies.kt未找到"; exit 1; }
          
          # 检查build.gradle文件
          [ -f "build.gradle" ] || { echo "错误: 根目录build.gradle未找到"; exit 1; }
          [ -f "app/build.gradle" ] || { echo "错误: app/build.gradle未找到"; exit 1; }
          
          echo "所有必需文件验证通过"

      # 5. 清理构建环境
      - name: Clean Build Environment
        run: |
          echo "清理构建缓存..."
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          rm -rf app/build
          rm -rf build

      # 6. JDK配置
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "24"
          distribution: "zulu"
          cache: 'gradle'

      # 7. Gradle依赖缓存
      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('​**​/*.gradle*', '​**​/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 8. 验证Gradle Wrapper
      - name: Validate Gradle Wrapper
        run: |
          echo "Gradle版本信息:"
          ./gradlew --version

      # 9. 版本提取
      - name: Extract Version
        id: version_info
        run: echo "version=$(./gradlew printVersion | grep -oP 'version=.*')" >> $GITHUB_OUTPUT

      # 10. 构建APK
      - name: Build APKs
        run: |
          set -eo pipefail
          echo "开始构建APK..."
          ./gradlew assembleNormalRelease assembleCompatibleRelease \
            -Pversion=${{ steps.version_info.outputs.version }}
          echo "构建完成"

      # 11. 定位构建产物
      - name: Locate Artifacts
        id: artifact_paths
        run: |
          echo "查找APK文件..."
          normal_apk=$(find app/build/outputs/apk/normal/release -name "*.apk" | head -n 1)
          compatible_apk=$(find app/build/outputs/apk/compatible/release -name "*.apk" | head -n 1)
          
          if [ -z "$normal_apk" ] || [ -z "$compatible_apk" ]; then
            echo "错误: 未找到APK文件"
            exit 1
          fi
          
          echo "::set-output name=normal_apk::$normal_apk"
          echo "::set-output name=compatible_apk::$compatible_apk"
          echo "找到APK:"
          echo "Normal: $normal_apk"
          echo "Compatible: $compatible_apk"

      # 12. 上传到Telegram
      - name: Upload to Telegram
        env:
          TELEGRAM_API: "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p release_assets
          cp ${{ steps.artifact_paths.outputs.normal_apk }} release_assets/
          cp ${{ steps.artifact_paths.outputs.compatible_apk }} release_assets/

          upload_file() {
            local file_path=$1
            local file_name=$(basename $file_path)
            
            if [ ! -f "$file_path" ]; then
              echo "错误: 文件不存在 - $file_path"
              exit 1
            fi

            echo "上传 $file_name..."
            response=$(curl -s -w "%{http_code}" -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F "document=@$file_path" \
                 -F "caption=#Release\n\n*版本*: $version\n*分支*: $GITHUB_REF_NAME" \
                 -F "parse_mode=MarkdownV2" \
                 "${TELEGRAM_API}/sendDocument")
            
            status_code=${response: -3}
            if [ "$status_code" != "200" ]; then
              echo "上传失败 ($status_code): $file_name"
              echo "响应: ${response%???}"
              exit 1
            else
              echo "上传成功: $file_name"
            fi
          }

          retry_upload() {
            local max_attempts=3
            local attempt=1
            local file_path=$1
            while [ $attempt -le $max_attempts ]; do
              upload_file "$file_path" && break || {
                echo "尝试 $attempt/$max_attempts 失败，5秒后重试..."
                sleep 5
                attempt=$((attempt+1))
              }
            done
          }

          retry_upload release_assets/$(basename ${{ steps.artifact_paths.outputs.normal_apk }})
          retry_upload release_assets/$(basename ${{ steps.artifact_paths.outputs.compatible_apk }})
