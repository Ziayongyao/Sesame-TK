name: Sync & Release

on:
  schedule:
    - cron: '0 8 * * *'  # 每日凌晨8点执行
  workflow_dispatch:
  push:
    tags: ["*"]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  packages: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    outputs:
      sync_status:: ${{ steps.sync_check.outputs.sync_status }}
      checkout_valid:: ${{ steps.checkout_verify.outputs.valid }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from Upstream
        id: sync_check
        env:
          UPSTREAM_REPO: "https://github.com/Fansirsqi/Sesame-TK.git"
          UPSTREAM_BRANCH: "main"
        run: |
          set -eo pipefail
          echo "Checking for upstream updates..."
          
          # 添加上游远程仓库
          git remote add upstream "${UPSTREAM_REPO}" 2>/dev/null || true
          git fetch upstream --depth=1 --no-tags
          
          # 检测新提交
          upstream_commits=$(git rev-list upstream/${UPSTREAM_BRANCH}..${UPSTREAM_BRANCH} --count)
          if [ "$upstream_commits" -gt 0 ]; then
            echo "Found ${upstream_commits} new commits, merging..."
            git merge upstream/${UPSTREAM_BRANCH} --no-commit --no-ff
            if [ $? -ne 0 ]; then
              echo "CONFLICT_DETECTED=1" >> $GITHUB_ENV
              echo "sync_status=conflict" >> $GITHUB_OUTPUT
              exit 1
            fi
            echo "sync_status=success" >> $GITHUB_OUTPUT
          else
            echo "sync_status=no-changes" >> $GITHUB_OUTPUT
          fi

      - name: Verify Checkout Integrity
        id: checkout_verify
        run: |
          echo "Validating critical files..."
          if [ ! -f "app/build.gradle" ] || [ ! -d ".github/workflows" ]; then
            echo "checkout_valid=false" >> $GITHUB_OUTPUT
            echo "sync_status=invalid_checkout" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "checkout_valid=true" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: sync-upstream
    if: |
      needs.sync-upstream.outputs.sync_status != 'conflict' &&
      needs.sync-upstream.outputs.sync_status != 'invalid_checkout' &&
      needs.sync-upstream.outputs.sync_status != 'no-changes'
    runs-on: ubuntu-latest
    concurrency: release-${{ github.ref }}
    
    steps:
      - name: Setup Environment
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: Extract Version
        id: version_info
        run: echo "version=$(./gradlew printVersion | grep -oP 'version=.*')" >> $GITHUB_OUTPUT

      - name: Configure JDK
        uses: actions/setup-java@v4
        with:
          java-version: "24"
          distribution: "zulu"
          cache: gradle

      - name: Build & Sign
        run: |
          ./gradlew assembleNormalRelease assembleCompatibleRelease \
            -Pversion=${{ steps.version_info.outputs.version }}
          ./gradlew signing --signing.keyId=${{ secrets.SIGNING_KEY_ID }} \
            --signing.password=${{ secrets.SIGNING_PASSWORD }} \
            --signing.secretKeyRingFile=${{ secrets.SIGNING_SECRET_KEY_RING }}

      - name: Locate Artifacts
        id: artifact_paths
        run: |
          normal_apk=$(find app/build/outputs/apk/normal/release -name "*.apk" | head -n 1)
          compatible_apk=$(find app/build/outputs/apk/compatible/release -name "*.apk" | head -n 1)
          echo "::set-output name=normal_apk::$normal_apk"
          echo "::set-output name=compatible_apk::$compatible_apk"

      - name: Telegram Notification
        env:
          TELEGRAM_API: "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}"
        run: |
          mkdir -p release_assets
          cp ${{ steps.artifact_paths.outputs.normal_apk }} release_assets/
          cp ${{ steps.artifact_paths.outputs.compatible_apk }} release_assets/

          upload_file() {
            local file_path=$1
            local file_name=$(basename $file_path)
            echo "Uploading $file_name ..."
            
            response=$(curl -s -w "%{http_code}" -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F "document=@$file_path" \
                 -F "caption=#Release\n\n*Version*: $version\n*Branch*: $GITHUB_REF_NAME\n\n${{ steps.commit_details.outputs.COMMIT_MESSAGE_BODY }}" \
                 -F "parse_mode=MarkdownV2" \
                 "${TELEGRAM_API}/sendDocument")
            
            status_code=${response: -3}
            if [ "$status_code" != "200" ]; then
              echo "Upload failed for $file_name"
              echo "Response: ${response%???}" >&2
              exit 1
            fi
          }

          upload_file release_assets/$(basename ${{ steps.artifact_paths.outputs.normal_apk }})
          upload_file release_assets/$(basename ${{ steps.artifact_paths.outputs.compatible_apk }})
