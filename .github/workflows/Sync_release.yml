name: Sync & Release

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    tags: ["*"]
  pull_request:
    branches: [develop, main]

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    outputs:
      sync_status:: ${{ steps.sync_check.outputs.sync_status }}
      has_conflict:: ${{ steps.sync_check.outputs.has_conflict }}
    steps:
      - name: Full Repository Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

  build-and-release:
    needs: sync-upstream
    if: needs.sync-upstream.outputs.sync_status != 'conflict'
    runs-on: ubuntu-latest
    concurrency: release-${{ github.ref }}
    
    steps:
      # 环境配置
      - name: System Check
        run: |
          echo "Java版本: $(java -version 2>&1 | head -n 1)"
          echo "Gradle版本: $(./gradlew --version | grep 'Gradle' | awk '{print $2}')"
          echo "系统架构: $(uname -m)"

      # 子模块深度初始化
      - name: Deep Submodule Initialization
        run: |
          echo "初始化子模块..."
          git submodule update --init --recursive --force
          git submodule foreach --recursive '
            if [ -f .gitmodules ]; then
              git checkout main || git checkout master || git checkout dev
            fi
          '

      # 文件完整性验证
      - name: Critical File Audit
        run: |
          echo "验证Gradle核心文件..."
          find . -name "gradle-wrapper.properties" 2>/dev/null | grep -q . || { echo "错误: gradle-wrapper.properties缺失"; exit 1; }
          find . -name "build.gradle.kts" 2>/dev/null | grep -q . || { echo "错误: build.gradle.kts缺失"; exit 1; }
          echo "所有核心文件验证通过"

      # 构建环境净化
      - name: Clean Build Environment
        run: |
          echo "清理Gradle缓存..."
          rm -rf ~/.gradle/caches || true
          rm -rf ~/.gradle/wrapper || true
          echo "清理项目构建产物..."
          rm -rf app/build || true
          rm -rf build || true

      # JDK配置与缓存
      - name: JDK Setup with Cache
        uses: actions/setup-java@v4
        with:
          java-version: "24"
          distribution: "zulu"
          cache: 'gradle'

      # 依赖缓存优化
      - name: Dependency Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('​**​/*.gradle*', '​**​/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Gradle Wrapper验证
      - name: Validate Wrapper
        run: |
          echo "Gradle版本信息:"
          ./gradlew --version --stacktrace
          echo "检查本地Maven仓库..."
          [ -d ~/.m2/repository ] || mkdir -p ~/.m2/repository

      # 版本信息提取
      - name: Extract Version
        id: version_info
        run: echo "version=$(./gradlew printVersion | grep -oP 'version=.*')" >> $GITHUB_OUTPUT

      # 增量编译构建
      - name: Incremental Build
        run: |
          set -eo pipefail
          echo "开始增量构建..."
          ./gradlew assembleNormalRelease assembleCompatibleRelease \
            --build-cache \
            -Pversion=${{ steps.version_info.outputs.version }} \
            --parallel \
            --max-workers=4

      # 构建产物验证
      - name: Artifact Verification
        run: |
          echo "查找APK文件..."
          normal_apk=$(find app/build/outputs/apk/normal/release -name "*.apk" | head -n 1)
          compatible_apk=$(find app/build/outputs/apk/compatible/release -name "*.apk" | head -n 1)
          
          [ -n "$normal_apk" ] || { echo "Normal APK缺失"; exit 1; }
          [ -n "$compatible_apk" ] || { echo "Compatible APK缺失"; exit 1; }

      # 安全上传配置
      - name: Secure Upload to Telegram
        env:
          TELEGRAM_API: "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p release_assets
          cp ${{ steps.artifact_paths.outputs.normal_apk }} release_assets/
          cp ${{ steps.artifact_paths.outputs.compatible_apk }} release_assets/

          upload_file() {
            local file_path=$1
            local file_name=$(basename $file_path)
            
            if [ ! -f "$file_path" ]; then
              echo "错误: 文件不存在 - $file_path"
              exit 1
            fi

            echo "上传 $file_name (SHA256: $(sha256sum $file_path | awk '{print $1}'))..."
            response=$(curl -s -w "%{http_code}" -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F "document=@$file_path" \
                 -F "caption=#Release\n\n*版本*: $version\n*分支*: $GITHUB_REF_NAME\n\n${{ steps.commit_details.outputs.COMMIT_MESSAGE_BODY }}" \
                 -F "parse_mode=MarkdownV2" \
                 "${TELEGRAM_API}/sendDocument")
            
            status_code=${response: -3}
            if [ "$status_code" != "200" ]; then
              echo "上传失败 ($status_code): $file_name"
              echo "响应内容: ${response%???}"
              exit 1
            else
              echo "上传成功: $file_name"
            fi
          }

          retry_upload() {
            local max_attempts=5
            local attempt=1
            local file_path=$1
            while [ $attempt -le $max_attempts ]; do
              upload_file "$file_path" && break || {
                echo "尝试 $attempt/$max_attempts 失败，10秒后重试..."
                sleep 10
                attempt=$((attempt+1))
              }
            done
          }

          retry_upload release_assets/$(basename ${{ steps.artifact_paths.outputs.normal_apk }})
          retry_upload release_assets/$(basename ${{ steps.artifact_paths.outputs.compatible_apk }})
