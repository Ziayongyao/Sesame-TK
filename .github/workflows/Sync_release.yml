name: Sync & Release

on:
  schedule:
    - cron: '0 8 * * *'  # 每天凌晨8点同步
  workflow_dispatch:
  push:
    tags: ["*"]
  pull_request:
    branches: [develop, main]

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    outputs:
      sync_status:: ${{ steps.sync_check.outputs.sync_status }}
      has_conflict:: ${{ steps.sync_check.outputs.has_conflict }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from Upstream
        id: sync_check
        run: |
          upstream_url="https://github.com/Fansirsqi/Sesame-TK.git"
          upstream_branch="main"
          
          # 添加上游远程仓库并验证
          git remote add upstream "$upstream_url" 2>/dev/null || true
          git fetch upstream --depth=1
          
          # 检测新提交并处理冲突
          upstream_commits=$(git rev-list upstream/$upstream_branch..$upstream_branch --count)
          if [ "$upstream_commits" -gt 0 ]; then
            git merge upstream/$upstream_branch --no-commit --no-ff
            if [ $? -ne 0 ]; then
              echo "CONFLICT_DETECTED=1" >> $GITHUB_ENV
              echo "::set-output name=has_conflict::true"
              echo "::set-output name=sync_status::conflict"
              echo "检测到冲突，请手动解决后重试"
              exit 1
            fi
            echo "::set-output name=sync_status::success"
          else
            echo "::set-output name=sync_status::no-changes"
          fi

  build-and-release:
    needs: sync-upstream
    if: needs.sync-upstream.outputs.sync_status != 'conflict'
    runs-on: ubuntu-latest
    concurrency: release-${{ github.ref }}
    
    steps:
      - name: Set Timezone
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: Extract Version
        id: version_info
        run: echo "version=$(./gradlew printVersion | grep -oP 'version=.*')" >> $GITHUB_OUTPUT
        env:
          GRADLE_USER_HOME: .gradle  # 缓存Gradle依赖

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "24"
          distribution: "zulu"
          cache: 'gradle'

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('​**​/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: |
          set -eo pipefail  # 严格错误处理
          ./gradlew assembleNormalRelease assembleCompatibleRelease \
            -Pversion=${{ steps.version_info.outputs.version }}
          echo "构建成功，版本号: ${{ steps.version_info.outputs.version }}"

      - name: Verify Build Artifacts
        run: |
          echo "验证APK文件存在性:"
          normal_apk=$(find app/build/outputs/apk/normal/release -name "*.apk" | head -n 1)
          compatible_apk=$(find app/build/outputs/apk/compatible/release -name "*.apk" | head -n 1)
          
          [ -f "$normal_apk" ] && echo "Normal APK存在: $normal_apk" || echo "Normal APK缺失"
          [ -f "$compatible_apk" ] && echo "Compatible APK存在: $compatible_apk" || echo "Compatible APK缺失"

      - name: Locate Artifacts
        id: artifact_paths
        run: |
          normal_apk=app/build/outputs/apk/normal/release/app-normal-release.apk
          compatible_apk=app/build/outputs/apk/compatible/release/app-compatible-release.apk
          echo "::set-output name=normal_apk::$normal_apk"
          echo "::set-output name=compatible_apk::$compatible_apk"

      - name: Upload to Telegram
        env:
          TELEGRAM_API: "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p release_assets
          cp ${{ steps.artifact_paths.outputs.normal_apk }} release_assets/
          cp ${{ steps.artifact_paths.outputs.compatible_apk }} release_assets/

          upload_file() {
            local file_path=$1
            local file_name=$(basename $file_path)
            
            if [ ! -f "$file_path" ]; then
              echo "ERROR: 文件不存在 - $file_path"
              exit 1
            fi

            echo "正在上传 $file_name ..."
            response=$(curl -s -w "%{http_code}" -F "chat_id=$TELEGRAM_CHAT_ID" \
                 -F "document=@$file_path" \
                 -F "caption=#Release\n\n*版本*: $version\n*分支*: $GITHUB_REF_NAME\n\n${{ steps.commit_details.outputs.COMMIT_MESSAGE_BODY }}" \
                 -F "parse_mode=MarkdownV2" \
                 "${TELEGRAM_API}/sendDocument")
            
            status_code=${response: -3}
            if [ "$status_code" != "200" ]; then
              echo "上传失败 ($status_code): $file_name"
              echo "响应内容: ${response%???}"
              exit 1
            else
              echo "上传成功: $file_name"
            fi
          }

          # 添加重试机制
          retry_upload() {
            local max_attempts=3
            local attempt=1
            local file_path=$1
            while [ $attempt -le $max_attempts ]; do
              upload_file "$file_path" && break || {
                echo "尝试 $attempt/$max_attempts 失败，5秒后重试..."
                sleep 5
                attempt=$((attempt+1))
              }
            done
          }

          retry_upload release_assets/$(basename ${{ steps.artifact_paths.outputs.normal_apk }})
          retry_upload release_assets/$(basename ${{ steps.artifact_paths.outputs.compatible_apk }})
