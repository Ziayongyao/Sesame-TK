name: Android CI with Release

on:
  push:
    tags: ["*.*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set Timezone
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: "24"
          distribution: "zulu"
          cache: gradle

      - name: Build APKs
        run: |
          ./gradlew assembleNormalRelease assembleCompatibleRelease -Pversion=${{ github.ref_name }}

      - name: Sign APKs
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Extract Version from Gradle
        id: version
        run: |
          version=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Generate Checksums
        run: |
          find app/build/outputs/apk -name '*signed.apk' | while read apk; do
            sha256sum "$apk" > "CHECKSUMS-$(basename $apk).sha256"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ steps.version.outputs.version }}"
          body: |
            ✨ **更新内容**:
            ${{ github.event.release.body || '无更新说明' }}
            ## ⬇️ 下载说明  
            - ​**Normal**: Android 8.0+  
            - ​**Compatible**: Android 5.1-7.0
          files: |
            app/build/outputs/apk/​**​/*signed.apk
            CHECKSUMS-*.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
