name: Build and Publish Release APK

on:
  push:
    tags:
      - "v*"  # 仅当推送以 v 开头的标签时触发（例如 v0.2.6）

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4  # 推荐最新稳定版[5](@ref)

      # 2. 设置 JDK（根据项目要求选择版本）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin  # 推荐使用 Temurin JDK[5](@ref)
          cache: gradle         # 启用 Gradle 缓存加速构建

      # 3. 配置 Gradle 环境
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4  # 官方 Gradle 插件[5](@ref)

      # 4. 赋予 Gradle 执行权限
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      # 5. 构建 Release APK（支持 Normal/Compatible 变体）
      - name: Build APKs
        run: |
          ./gradlew :app:assembleNormalRelease  # Normal 版本
          ./gradlew :app:assembleCompatibleRelease  # Compatible 版本

      # 6. 上传 APK 到 Releases
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1  # 更灵活的 Release 管理[1,4](@ref)
        with:
          files: |
            app/build/outputs/apk/normal/release/*.apk
            app/build/outputs/apk/compatible/release/*.apk
          tag_name: ${{ github.ref_name }}  # 使用触发工作流的标签名
          body: "📦 自动构建版本 ${{ github.ref_name }}\n\n包含以下 APK 文件：\n- Normal（Android 8.0+）\n- Compatible（Android 5.1-7.0）"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 自动注入，无需额外配置[1,5](@ref)
