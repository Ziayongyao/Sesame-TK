name: Build and Publish APK to Release

on:
  push:
    tags:
      - "*.*"  # 匹配类似 0.2-alpha 的 Tag 格式

# 关键权限：必须声明写入权限才能创建 Release
permissions:
  contents: write  # 解决同步失败的核心配置[4,5](@ref)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 24
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 24
          distribution: temurin
          cache: gradle  # 启用 Gradle 缓存加速构建

      # 3. 赋予 Gradle 执行权限
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      # 4. 构建 Normal 和 Compatible 版本 APK
      - name: Build APKs
        run: |
          ./gradlew :app:assembleNormalRelease
          ./gradlew :app:assembleCompatibleRelease

      # 5. 发布到 GitHub Releases
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1  # 推荐社区维护的 Action[5,7](@ref)
        with:
          files: |
            app/build/outputs/apk/normal/release/*.apk
            app/build/outputs/apk/compatible/release/*.apk
          tag_name: ${{ github.ref_name }}  # 使用触发工作流的 Tag 名称
          name: "Release ${{ github.ref_name }}"
          body: |
            📦 Sesame-TK 自动构建版本 ${{ github.ref_name }}
            - ​**Normal**: Android 8.0+
            - ​**Compatible**: Android 5.1 - 7.0
          draft: false
          prerelease: false
          overwrite: true  # 允许覆盖同名 Release[4](@ref)
